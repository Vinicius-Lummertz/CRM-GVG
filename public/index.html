<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard de Leads WhatsApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900">
    <main class="mx-auto max-w-6xl px-4 py-8 md:px-8">
      <header class="mb-8 rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
        <p class="text-xs font-semibold uppercase tracking-wider text-emerald-600">Twilio + WhatsApp</p>
        <h1 class="mt-2 text-3xl font-bold tracking-tight">Dashboard de Leads WhatsApp</h1>
        <p class="mt-2 text-sm text-slate-600">
          Atualizacao em tempo real via SSE sempre que o webhook receber nova mensagem.
        </p>

        <div class="mt-5 flex flex-wrap gap-3">
          <div class="rounded-xl bg-slate-900 px-4 py-3 text-white">
            <p class="text-xs uppercase text-slate-300">Total de leads</p>
            <p id="total-leads" class="text-2xl font-semibold">0</p>
          </div>
          <div id="connection-pill" class="rounded-xl bg-amber-100 px-4 py-3 text-amber-800">
            Conectando stream...
          </div>
        </div>

        <div class="mt-5 grid grid-cols-1 gap-3 md:grid-cols-3">
          <label class="rounded-xl bg-slate-50 p-3 ring-1 ring-slate-200">
            <span class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-500">Filtro status</span>
            <select id="filter-status" class="w-full rounded-md border border-slate-300 bg-white px-2 py-1.5 text-sm">
              <option value="">Todos</option>
              <option value="lead">lead</option>
              <option value="em_contato">em_contato</option>
              <option value="interessado">interessado</option>
              <option value="proposta_enviada">proposta_enviada</option>
              <option value="negociando">negociando</option>
              <option value="ganho">ganho</option>
              <option value="perdido">perdido</option>
              <option value="inativo">inativo</option>
            </select>
          </label>

          <label class="rounded-xl bg-slate-50 p-3 ring-1 ring-slate-200">
            <span class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-500">Filtro temperatura</span>
            <select id="filter-temperature" class="w-full rounded-md border border-slate-300 bg-white px-2 py-1.5 text-sm">
              <option value="">Todas</option>
              <option value="cold">cold</option>
              <option value="warm">warm</option>
              <option value="hot">hot</option>
            </select>
          </label>

          <label class="flex items-center gap-2 rounded-xl bg-slate-50 p-3 ring-1 ring-slate-200">
            <input id="filter-attention" type="checkbox" class="h-4 w-4 rounded border-slate-300 text-rose-600 focus:ring-rose-500" />
            <span class="text-sm font-medium text-slate-700">Somente com atenção necessária</span>
          </label>
        </div>
      </header>

      <section>
        <div id="lead-list" class="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-3"></div>
      </section>
    </main>

    <div
      id="media-modal"
      class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/70 p-4 opacity-0 transition-opacity duration-200"
      aria-hidden="true"
    >
      <div
        id="media-modal-panel"
        class="relative w-full max-w-4xl scale-95 transform rounded-2xl bg-white p-3 shadow-2xl transition-transform duration-200"
      >
        <button
          id="media-modal-close"
          type="button"
          class="absolute right-3 top-3 rounded-md bg-slate-900 px-2 py-1 text-xs font-medium text-white hover:bg-slate-700"
        >
          Fechar
        </button>
        <img
          id="media-modal-image"
          src=""
          alt="Midia ampliada"
          class="max-h-[80vh] w-full rounded-xl bg-slate-100 object-contain"
        />
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
